# Torgor & Tweed - Nginx Reverse Proxy Configuration
# Location: /etc/nginx/sites-available/torgor-and-tweed

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP to HTTPS Redirect (uncomment after SSL setup)
# server {
#     listen 80;
#     server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER;

    # Uncomment after SSL certificate obtained:
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:\!aNULL:\!MD5;
    # ssl_prefer_server_ciphers on;

    client_max_body_size 50M;
    proxy_buffering off;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;

    access_log /var/log/nginx/torgor-access.log combined;
    error_log /var/log/nginx/torgor-error.log warn;

    # Static Next.js assets - cache forever
    location /_next/static {
        proxy_cache_valid 365d;
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, immutable, max-age=31536000";
        expires 365d;
    }

    # Public assets - cache 30 days
    location /public {
        alias /home/torgor/app/public;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Health check
    location /health {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        access_log off;
    }

    # Default - proxy to Next.js
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
        proxy_buffering off;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
    }
}
