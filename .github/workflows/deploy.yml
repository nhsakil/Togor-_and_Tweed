name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  APP_NAME: 'torgor-and-tweed'

jobs:
  # Build & Test Job
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test:ci
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Verify standalone build
        run: |
          if [ \! -f .next/standalone/server.js ]; then
            echo "ERROR: Standalone build not created"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 7

  # Deploy Job (Only on main branch)
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          tar --exclude=node_modules --exclude=.next/cache -czf deploy.tar.gz \
            package.json package-lock.json next.config.ts tsconfig.json \
            ecosystem.config.js public prisma src .next/

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            deploy.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e
          cd /home/${{ secrets.VPS_USER }}/app
          tar -xzf /tmp/deploy.tar.gz
          npm ci
          npx prisma migrate deploy
          npm run build
          pm2 restart ${{ env.APP_NAME }} || pm2 start ecosystem.config.js
          pm2 save
          EOF

      - name: Verify deployment
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "curl -f http://localhost:3000/health || exit 1"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

# Setup Instructions:
# 1. Add GitHub Secrets:
#    - VPS_HOST: IP or domain (e.g., 192.168.1.1)
#    - VPS_USER: SSH username (e.g., torgor)
#    - DEPLOY_PRIVATE_KEY: SSH private key
#    - DOMAIN: Production domain
#
# 2. Add public key to VPS authorized_keys
#    ssh-copy-id -i ~/.ssh/deploy_key.pub torgor@VPS_IP
