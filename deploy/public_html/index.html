<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torgor &amp; Tweed — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #c8a96e;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 3rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #c8a96e;
      margin: 0 auto 3rem;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      color: #aaa;
      max-width: 420px;
      line-height: 1.7;
      font-family: 'Arial', sans-serif;
    }

    .badge {
      margin-top: 3rem;
      display: inline-block;
      border: 1px solid #c8a96e44;
      color: #c8a96e;
      font-family: 'Arial', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="logo">Torgor &amp; Tweed</div>
  <div class="tagline">Wear the story</div>
  <div class="divider"></div>
  <h1>We're almost ready.</h1>
  <p>Our store is being crafted with care. Something beautiful is coming soon — fashion worth waiting for.</p>
  <div class="badge">Launching Soon</div>
</body>
</html>
