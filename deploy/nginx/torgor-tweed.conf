# ══════════════════════════════════════════════════════════════════════════
#  Torgor & Tweed — Nginx Configuration (Hostinger VPS)
#  File location on server: /etc/nginx/sites-available/torgor-tweed.conf
#  Enable:  sudo ln -s /etc/nginx/sites-available/torgor-tweed.conf /etc/nginx/sites-enabled/
#  Reload:  sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name torgorandtweed.com www.torgorandtweed.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name torgorandtweed.com www.torgorandtweed.com;

    # ── SSL (managed by certbot) ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/torgorandtweed.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/torgorandtweed.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Logging ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/torgor-tweed.access.log;
    error_log  /var/log/nginx/torgor-tweed.error.log;

    # ── Gzip ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Next.js static files (standalone build) ─────────────────────────
    # Served directly by Nginx — faster than passing through Node
    location /_next/static/ {
        alias /var/www/torgor-tweed/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /var/www/torgor-tweed/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Favicon & robots ────────────────────────────────────────────────
    location = /favicon.ico { alias /var/www/torgor-tweed/public/favicon.ico; access_log off; }
    location = /robots.txt  { alias /var/www/torgor-tweed/public/robots.txt;  access_log off; }

    # ── All other requests → Next.js (PM2 on port 3000) ─────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Rate limiting (basic DDoS protection) ───────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Block sensitive paths ────────────────────────────────────────────
    location ~ /\.(git|env|htaccess) { deny all; return 404; }
    location ~ /prisma/              { deny all; return 404; }
    location ~ /node_modules/        { deny all; return 404; }
}
